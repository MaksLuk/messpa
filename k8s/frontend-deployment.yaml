apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: freelance
  annotations:
    kompose.cmd: kompose convert --out k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --out k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: frontend
    spec:
      containers:
        - env:
            - name: DOMAIN
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DOMAIN
            - name: NEXT_PUBLIC_API_URL
              value: https://$(DOMAIN)/api
          image: frontend
          name: freelance-frontend
          ports:
            - containerPort: 3000
              protocol: TCP
      restartPolicy: Always
