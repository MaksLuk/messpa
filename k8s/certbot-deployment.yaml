apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: freelance
  annotations:
    kompose.cmd: kompose convert --out k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: certbot
  name: certbot
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: certbot
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --out k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: certbot
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - ' if [ ! -f /etc/letsencrypt/live/localhost/fullchain.pem ]; then echo "First run - obtaining certificate..."; certbot certonly --webroot --webroot-path=/var/www/certbot \ --email your@email.com --agree-tos --no-eff-email --non-interactive -d localhost; fi echo "Starting renewal loop..."; trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait ${!}; done'
          env:
            - name: DOMAIN
              value: localhost
            - name: EMAIL
              value: your@email.com
          image: certbot/certbot:latest
          name: certbot
          volumeMounts:
            - mountPath: /var/www/certbot
              name: certbot-webroot
            - mountPath: /etc/letsencrypt
              name: certbot-conf
      restartPolicy: Always
      volumes:
        - name: certbot-webroot
          persistentVolumeClaim:
            claimName: certbot-webroot
        - name: certbot-conf
          persistentVolumeClaim:
            claimName: certbot-conf
